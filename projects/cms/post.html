<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ================================================
   POST PAGE — Mahdi Yasser
   Two-column editorial layout · Amber / Dark
   ================================================ */
:root {
    --bg:        #0c0c0f;
    --surface:   #13131a;
    --surface2:  #1a1a24;
    --accent:    #f0a500;
    --accent-d:  rgba(240,165,0,0.10);
    --accent-b:  rgba(240,165,0,0.25);
    --text:      #e8e8f0;
    --muted:     #6a6a90;
    --border:    rgba(255,255,255,0.06);
    --ease:      cubic-bezier(0.22,1,0.36,1);
    --r:         10px;
    --sidebar-w: 240px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 99px; }

body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    min-height: 100vh;
}

/* ---- OUTER WRAPPER ---- */
.post-outer {
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 2rem 6rem;
}

/* ---- TOP NAV (mobile + minimal desktop) ---- */
.post-topbar {
    padding: 1.5rem 0 0;
    margin-bottom: 3rem;
}

/* ---- TWO-COLUMN LAYOUT ---- */
.post-layout {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    gap: 5rem;
    align-items: start;
}

/* ================================================
   SIDEBAR
   ================================================ */
.post-sidebar {
    position: sticky;
    top: 2.5rem;
}

.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
    cursor: pointer;
    margin-bottom: 2.5rem;
    white-space: nowrap;
}
.back-btn:hover { color: var(--accent); }
.back-btn i { font-size: 0.65rem; }

/* Project label */
.sidebar-project {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    margin-bottom: 1.75rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
}
.sidebar-project i { font-size: 0.6rem; }

/* Meta items */
.sidebar-meta {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}
.meta-item {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.45;
}
.meta-item i {
    color: var(--accent);
    font-size: 0.62rem;
    margin-top: 2px;
    flex-shrink: 0;
}

/* Divider below meta */
.sidebar-divider {
    margin-top: 2rem;
    border: none;
    border-top: 1px solid var(--border);
}

/* ================================================
   MAIN CONTENT
   ================================================ */
.post-main {
    min-width: 0; /* CRITICAL — prevents grid blowout */
}

/* ---- TITLE ---- */
h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 4.5vw, 3.4rem);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 1.5rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
    overflow-wrap: break-word;
    word-break: break-word;
}

/* ---- BIO (italic intro quote) ---- */
.bio {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--muted);
    font-style: italic;
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--r) var(--r) 0;
    background: var(--accent-d);
    padding: 1rem 1.25rem;
    margin-bottom: 2.5rem;
    overflow-wrap: break-word;
    word-break: break-word;
}

/* ---- CONTENT BODY ---- */
.content {
    font-size: 1rem;
    line-height: 1.9;
    color: var(--text);
    overflow-wrap: break-word;
    word-break: break-word;
}
.content h2, .content h3, .content h4 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: var(--accent);
    margin: 2.25rem 0 0.85rem;
    line-height: 1.25;
    overflow-wrap: break-word;
}
.content h2 { font-size: 1.55rem; }
.content h3 { font-size: 1.25rem; }
.content h4 { font-size: 1.05rem; }
.content p { margin-bottom: 1.2rem; }
.content ul, .content ol { margin: 0 0 1.2rem 1.5rem; }
.content li { margin-bottom: 0.45rem; }
.content a { color: var(--accent); text-underline-offset: 3px; }
.content a:hover { opacity: 0.75; }
.content strong { color: var(--text); font-weight: 700; }
.content em { color: var(--muted); }
.content code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82em;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    overflow-wrap: break-word;
    word-break: break-all;
}
.content pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 1.35rem 1.5rem;
    overflow-x: auto;
    margin: 1.75rem 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.65;
}
.content pre code { background: none; border: none; padding: 0; font-size: inherit; word-break: normal; overflow-wrap: normal; }
.content blockquote {
    border-left: 3px solid var(--accent);
    background: var(--accent-d);
    padding: 0.75rem 1.1rem;
    border-radius: 0 var(--r) var(--r) 0;
    color: var(--muted);
    font-style: italic;
    margin: 1.75rem 0;
    overflow-wrap: break-word;
}
.content hr { border: none; border-top: 1px solid var(--border); margin: 2.25rem 0; }
.content img { max-width: 100%; border-radius: var(--r); border: 1px solid var(--border); display: block; margin: 1.5rem 0; }
.content table { width: 100%; border-collapse: collapse; margin: 1.75rem 0; font-size: 0.88rem; display: block; overflow-x: auto; }
.content th {
    background: var(--surface);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.65rem 1rem;
    border-bottom: 1px solid var(--border);
    text-align: left;
    white-space: nowrap;
}
.content td { padding: 0.6rem 1rem; border-bottom: 1px solid var(--border); vertical-align: top; }

/* ---- GALLERY ---- */
.images-section {
    margin-top: 3.5rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
}
.images-section:has(.images:empty) { display: none; }

.gallery-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
}
.gallery-label i { color: var(--accent); }

.images {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
}
.images:empty { display: none; }
.images img {
    width: 100%;
    display: block;
    border-radius: var(--r);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.35s var(--ease), border-color 0.2s, box-shadow 0.3s;
    object-fit: cover;
    aspect-ratio: 16/10;
}
.images img:hover {
    transform: scale(1.015);
    border-color: var(--accent-b);
    box-shadow: 0 0 26px rgba(240,165,0,0.12);
}

/* ---- FOOTER ---- */
footer {
    margin-top: 3.5rem;
    padding-top: 1.75rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
}
.back {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
}
.back:hover { color: var(--accent); }

/* ---- LIGHTBOX ---- */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.94);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s var(--ease);
    z-index: 9999;
}
.popup.active { opacity: 1; pointer-events: all; }
.popup-img-wrap { max-width: 88vw; max-height: 88vh; }
.popup img {
    max-width: 88vw;
    max-height: 86vh;
    border-radius: 12px;
    border: 1px solid var(--accent-b);
    object-fit: contain;
    display: block;
}
.popup-close {
    position: fixed;
    top: 1.25rem; right: 1.25rem;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-size: 0.95rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.18s;
    z-index: 10000;
}
.popup-close:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-d); }

/* ================================================
   RESPONSIVE
   ================================================ */
@media (max-width: 860px) {
    .post-layout {
        grid-template-columns: 1fr;
        gap: 0;
    }
    .post-sidebar {
        position: static;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 1rem 2rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1.5rem;
        margin-bottom: 2rem;
    }
    .back-btn { margin-bottom: 0; }
    .sidebar-project {
        margin-bottom: 0;
        padding-bottom: 0;
        border-bottom: none;
    }
    .sidebar-meta {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 0.5rem 1.25rem;
    }
    .sidebar-divider { display: none; }
}

@media (max-width: 560px) {
    .post-outer { padding: 0 1rem 4rem; }
    h1 { font-size: 2rem; }
    .images { grid-template-columns: 1fr; }
    footer { flex-direction: column; gap: 0.5rem; }
    .popup img { max-width: 95vw; max-height: 82vh; }
}
</style>
</head>
<body>
<div class="post-outer">

    <nav class="post-topbar">
        <!-- visible only on mobile via the sidebar's back-btn on desktop -->
    </nav>

    <div class="post-layout">

        <!-- ==============================
             SIDEBAR
             ============================== -->
        <aside class="post-sidebar">

            <a href="javascript:history.back()" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Back to {{PROJECT_NAME}}</span>
            </a>

            <div class="sidebar-project">
                <i class="fa-solid fa-code-branch"></i>
                <span>{{PROJECT_NAME}}</span>
            </div>

            <div class="sidebar-meta">
                <div class="meta-item">
                    <i class="fa-solid fa-calendar-days"></i>
                    <span id="date">{{DATE}}</span>
                </div>
                <div class="meta-item">
                    <i class="fa-solid fa-clock"></i>
                    <span id="time">{{TIME}}</span>
                </div>
                <div class="meta-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <span id="location">{{LOCATION}}</span>
                </div>
            </div>

            <hr class="sidebar-divider">

        </aside>

        <!-- ==============================
             MAIN CONTENT
             ============================== -->
        <main class="post-main">

            <h1>{{TITLE}}</h1>

            <div class="bio">{{BIO}}</div>

            <div class="content">{{CONTENT}}</div>

            <div class="images-section">
                <p class="gallery-label">
                    <i class="fa-solid fa-images"></i>
                    Gallery
                </p>
                <div class="images">{{IMAGES}}</div>
            </div>

            <footer>
                <a href="javascript:history.back()" class="back">
                    <i class="fa-solid fa-arrow-left"></i>
                    Back to {{PROJECT_NAME}}
                </a>
                <span>&copy; 2025&ndash;2026 Mahdi Yasser</span>
            </footer>

        </main>

    </div><!-- /.post-layout -->
</div><!-- /.post-outer -->

<!-- ==============================
     LIGHTBOX
     ============================== -->
<div class="popup" id="popup">
    <button class="popup-close" id="popup-close" aria-label="Close">
        <i class="fa-solid fa-xmark"></i>
    </button>
    <div class="popup-img-wrap">
        <img src="" alt="Full image" id="popup-img">
    </div>
</div>

<script>
(function () {
    var popup  = document.getElementById('popup');
    var pImg   = document.getElementById('popup-img');
    var pClose = document.getElementById('popup-close');

    document.querySelectorAll('.images img').forEach(function (img) {
        img.addEventListener('click', function () {
            pImg.src = img.src;
            popup.classList.add('active');
        });
    });

    pClose.addEventListener('click', function () { popup.classList.remove('active'); });
    popup.addEventListener('click', function (e) { if (e.target === popup) popup.classList.remove('active'); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') popup.classList.remove('active'); });
})();
</script>
</body>
</html>
